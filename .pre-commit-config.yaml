repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types_or: [python, pyi]
        files: ^(src/|build_tools/|setup\.py$)
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check
        language: system
        types_or: [python, pyi]
        files: ^(src/|build_tools/|setup\.py$)
      - id: mypy
        name: mypy
        entry: python -m mypy src build_tools
        language: system
        pass_filenames: false
